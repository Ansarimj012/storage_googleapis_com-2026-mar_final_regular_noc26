<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Viewer</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  background:#2f2f2f;
  overflow:hidden;
}

/* FULL PDF VIEW */
.viewer{
  width:100%;
  height:100vh;
}

/* PDF */
.viewer embed{
  width:100%;
  height:100%;
}

/* MOBILE */
@media(max-width:768px){

  .viewer{
    height:100vh;
  }

}

</style>
</head>

<body>

<div class="viewer">

  <!-- Replace with your PDF -->
  <embed 
    src="NOC26MG77S115020260904225182.pdf#toolbar=1&navpanes=1&scrollbar=1&view=FitH"
    type="application/pdf">

</div>

</body>
</html>
