<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPTEL Certificate</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  background:#2f2f2f;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* CENTER PDF */
.pdf-container{
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* PDF */
.pdf-container iframe{
  width:100%;
  height:100%;
  border:none;
}

/* MOBILE ANDROID */
@media(max-width:768px){

  html,body{
    overflow:hidden;
  }

  .pdf-container{
    width:100%;
    height:100vh;
    justify-content:center;
    align-items:center;
  }

  .pdf-container iframe{
    width:100%;
    height:100%;
  }

}

</style>
</head>

<body>

<div class="pdf-container">

  <!-- PDF AUTO OPENS -->
  <iframe
    src="NOC26MG77S11502026090422518.pdf#view=FitH&toolbar=1&navpanes=1&scrollbar=1">
  </iframe>

</div>

</body>
</html>
